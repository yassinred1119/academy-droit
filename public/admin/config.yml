backend:
  name: github
  repo: yassinred1119/academy-droit # اسم حسابك والمستودع بدقة
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "articles"
    label: "المقالات"
    label_singular: "مقال"
    # التعديل السحري: الحفظ في ملف JSON واحد داخل مجلد public لتسهيل قراءته في React
    type: "file"
    file: "public/data/articles.json"
    format: "json"
    fields:
      - { label: "المعرف الرقمي (id)", name: "id", widget: "number", value_type: "int" }
      - { label: "العنوان", name: "title", widget: "string" }
      - { label: "الكاتب", name: "author", widget: "string" }
      - { label: "التاريخ (YYYY/MM/DD)", name: "date", widget: "string" }
      - { label: "عدد المشاهدات التخيلي", name: "views", widget: "number", default: 100, value_type: "int" }
      - { label: "التصنيف", name: "category", widget: "select", options: ["القانون المدني", "القانون الجنائي", "قانون العائلة", "القانون الدستوري", "قانون الشغل"] }
      - { label: "رابط الصورة المعبرة", name: "image", widget: "string", default: "https://images.pexels.com/photos/5668858/pexels-photo-5668858.jpeg" }
      - { label: "مقال مميز؟", name: "featured", widget: "boolean", default: false }
      - { label: "نص المقال بالكامل", name: "body", widget: "markdown" }

  - name: "summaries"
    label: "الملخصات القانونية"
    label_singular: "ملخص"
    type: "file"
    file: "public/data/summaries.json"
    format: "json"
    fields:
      - { label: "المعرف الرقمي (id)", name: "id", widget: "number", value_type: "int" }
      - { label: "عنوان المادة / الملخص", name: "title", widget: "string" }
      - { label: "وصف فرعي للملخص", name: "description", widget: "string" }
      - { label: "السنة الدراسية", name: "yearTag", widget: "select", options: ["السنة الأولى", "السنة الثانية", "السنة الثالثة", "السنة الرابعة"] }
      - { label: "نوع الملخص", name: "status", widget: "select", options: ["مجاني", "مدفوع"], default: "مجاني" }
      - { label: "عدد الصفحات (مثال: 85 صفحة)", name: "pages", widget: "string" }
      - { label: "عدد التحميلات التخيلي (مثال: 4,200 تحميل)", name: "downloads", widget: "string", default: "1,200 تحميل" }
      - { label: "رابط الصورة المعبرة", name: "image", widget: "string", default: "https://images.pexels.com/photos/5668858/pexels-photo-5668858.jpeg" }
      - { label: "رابط ملف الـ PDF للتحميل", name: "pdfUrl", widget: "string", hint: "ضع رابط جوجل درايف أو الملف المرفوع" }

- name: "seminars"
    label: "الندوات والمؤتمرات"
    label_singular: "ندوة"
    type: "file"
    file: "public/data/seminars.json"
    format: "json"
    fields:
      - { label: "المعرف الرقمي (id)", name: "id", widget: "number", value_type: "int" }
      - { label: "عنوان الندوة", name: "title", widget: "string" }
      - { label: "اسم الأستاذ / المحاضر", name: "speaker", widget: "string" }
      - { label: "رقم اليوم فقط (مثال: 25)", name: "day", widget: "string" }
      - { label: "اسم الشهر والسنة (مثال: يونيو 2024)", name: "monthYear", widget: "string" }
      - { label: "التوقيت (مثال: 18:00 - 20:00)", name: "time", widget: "string" }
      - { label: "التاريخ الكامل (مثال: 25 يونيو 2024)", name: "fullDate", widget: "string" }
      - { label: "نوع الندوة", name: "type", widget: "select", options: ["عبر الإنترنت", "حضوري"], default: "عبر الإنترنت" }
      - { label: "رابط استمارة التسجيل (Google Forms)", name: "formLink", widget: "string", hint: "ضع هنا رابط الفورم لتسجيل بيانات الطلاب" }
